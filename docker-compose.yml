services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    image: asklake-backend:local
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: local

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    image: asklake-frontend:local
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
