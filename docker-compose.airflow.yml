x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  environment:
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: asklake-local-airflow-secret
    ASKLAKE_REPO_ROOT: /opt/asklake
    ASKLAKE_WEEK2_AIRFLOW_DATA_ROOT: /opt/asklake/data/week2
    ASKLAKE_WEEK2_AIRFLOW_OUTPUT_PATH_PREFIX: data/week2
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./contracts:/opt/asklake/contracts:ro
    - ./backend/samples:/opt/asklake/backend/samples:ro
    - ./data/week2:/opt/asklake/data/week2
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_USER: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Local \
          --lastname Admin \
          --role Admin \
          --email airflow@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      retries: 5
      start_period: 30s
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy

volumes:
  airflow-postgres-data:
