schema_version: 1

milestone:
  id: target-mvp
  status: planned
  last_update: 2026-06-24
  runtime_implementation: thin_core_available
  parallel_execution_approval: required

first_parallel_wave:
  status: proposed
  approval_required: true
  workstreams:
    - catalog_trust
    - source_connector
    - job_orchestrator
    - query_policy
  guardrails:
    - Query/Policy remains mock/fake only until real policy and data access are approved.
    - Parallel worktree/thread/branch creation requires a separate human checkpoint.
    - R0.6 provides only thin runtime skeleton and fake providers, not completed feature implementation.

thin_runtime_core:
  status: available
  branch: feature/thin-runtime-core
  code_mapping:
    contracts: backend/app/domain/target_contracts.py
    fakes: backend/app/fakes/
    ports:
      - backend/app/ports/policy_engine.py
      - backend/app/ports/query_engine.py
      - backend/app/ports/job_runner.py
    services:
      - backend/app/services/catalog_trust.py
      - backend/app/services/query_policy.py
      - backend/app/services/job_orchestrator.py
    frontend_features:
      - frontend/src/features/catalog/
      - frontend/src/features/sources/
      - frontend/src/features/jobs/
      - frontend/src/features/query/

